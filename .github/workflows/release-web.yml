name: Release Web

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release-web:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CHANGELOG_PATH: ${{ github.workspace }}/dist/CHANGELOG.md
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build release
        run: make -f Makefile.release
        env:
          NO_INSTALL: 'true'

      - name: Generate checksums
        run: |
          cd ${{ github.workspace }}/release
          md5sum * > md5sum.txt
          sha256sum * > sha256sum.txt

      - name: Get release version
        id: version
        run: echo "version=$(echo '${{ github.ref_name }}' | sed 's/^v//' | cut -d- -f1)" >> "$GITHUB_OUTPUT"

      - name: Generate release changelog
        uses: actionhippie/calens@e9170506332c244739683cb578d99b6cabd9b296 # v1.14.0
        with:
          version: ${{ steps.version.outputs.version }}
          target: ${{ env.CHANGELOG_PATH }}
          template: changelog/CHANGELOG-Release.tmpl

      - name: Publish release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          working_directory: ${{ github.workspace }}
          files: |
            release/*
          name: ${{ steps.version.outputs.version }}
          body_path: ${{ env.CHANGELOG_PATH }}
