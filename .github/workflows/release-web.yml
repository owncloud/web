name: Release Web

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release-web:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CHANGELOG_PATH: ${{ github.workspace }}/dist/CHANGELOG.md
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build release
        run: make -f Makefile.release
        env:
          NO_INSTALL: 'true'

      - name: Generate checksums
        run: |
          cd ${{ github.workspace }}/release
          md5sum * > md5sum.txt
          sha256sum * > sha256sum.txt

      - name: Get release version
        id: version
        run: echo "version=$(echo '${{ github.ref_name }}' | sed 's/^v//' | cut -d- -f1)" >> "$GITHUB_OUTPUT"

      - name: Generate release changelog
        uses: actionhippie/calens@6340fdcb8b9ed26c84fe067d901efb89611ed23c # v1.13.5
        with:
          version: ${{ steps.version.outputs.version }}
          target: ${{ env.CHANGELOG_PATH }}
          template: changelog/CHANGELOG-Release.tmpl

      - name: Publish release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          working_directory: ${{ github.workspace }}
          files: |
            release/*
          name: ${{ steps.version.outputs.version }}
          body_path: ${{ env.CHANGELOG_PATH }}
