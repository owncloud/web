name: Nightly

on:
  schedule:
    # Run every day at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  e2e:
    needs: build
    uses: ./.github/workflows/_e2e.yml
    with:
      full-ci: true
