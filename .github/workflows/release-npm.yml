name: Release NPM

on:
  push:
    tags:
      - 'babel-preset-v*'
      - 'design-system-v*'
      - 'eslint-config-v*'
      - 'extension-sdk-v*'
      - 'prettier-config-v*'
      - 'tsconfig-v*'
      - 'web-client-v*'
      - 'web-pkg-v*'
      - 'web-test-helpers-v*'

permissions:
  contents: read

jobs:
  release-npm:
    name: Publish NPM package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Determine package
        id: package
        run: |
          TAG="${{ github.ref_name }}"
          PACKAGES="babel-preset design-system eslint-config extension-sdk prettier-config tsconfig web-client web-pkg web-test-helpers"
          for pkg in $PACKAGES; do
            if [[ "$TAG" == "${pkg}-v"* ]]; then
              echo "name=$pkg" >> "$GITHUB_OUTPUT"
              echo "version=${TAG#${pkg}-v}" >> "$GITHUB_OUTPUT"
              break
            fi
          done

      - name: Verify package version
        run: |
          PKG="${{ steps.package.outputs.name }}"
          VERSION="${{ steps.package.outputs.version }}"
          ACTUAL_VERSION=$(jq -r '.version' < "packages/${PKG}/package.json")
          echo "Build ${PKG} ${VERSION} package.json: ${ACTUAL_VERSION}"
          if [ "${ACTUAL_VERSION}" != "${VERSION}" ]; then
            echo "git tag does not match version in packages/${PKG}/package.json"
            exit 1
          fi

      - name: Build tokens
        run: pnpm build:tokens

      - name: Build package
        run: |
          PKG="${{ steps.package.outputs.name }}"
          case "$PKG" in
            design-system|web-client|web-pkg|web-test-helpers)
              pnpm --filter "@ownclouders/${PKG}" vite build
              ;;
          esac

      - name: Publish to NPM
        run: |
          env "npm_config_//registry.npmjs.org/:_authToken=${NPM_TOKEN}" pnpm whoami
          env "npm_config_//registry.npmjs.org/:_authToken=${NPM_TOKEN}" pnpm publish \
            --no-git-checks --filter "@ownclouders/${{ steps.package.outputs.name }}" \
            --access public --tag latest
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: '@ownclouders/${{ steps.package.outputs.name }} ${{ steps.package.outputs.version }}'
