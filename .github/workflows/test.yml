name: Test and build

on:
  push:
    branches:
      - master
      - stable-*
    tags:
      - "*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.14.1
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Check licenses
        run: pnpm licenses:check

      - name: Save licenses
        run: pnpm licenses:csv && pnpm licenses:save

      - name: Check types
        run: pnpm check:types

      - name: Check format
        run: pnpm check:format

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:unit --coverage

      - name: SonarCloud Scan
        if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PULL_REQUEST_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || '' }}
          SONAR_PULL_REQUEST_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || '' }}
          SONAR_PULL_REQUEST_KEY: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}

      - name: Build
        run: make dist

      - name: Store build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: web-dist
          path: dist
          if-no-files-found: error

  e2e-playwright:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suites:
          - name: admin-settings
            federated: false
            tika: false
          - name: app-provider
            federated: false
            tika: false
          - name: app-store
            federated: false
            tika: false
          - name: file-action
            federated: false
            tika: false
          - name: navigation
            federated: false
            tika: false
          - name: ocm
            federated: true
          - name: oidc
            federated: false
            tika: false
          - name: runtime
            federated: false
            tika: false
          - name: search
            federated: false
            tika: true
          - name: shares
            federated: false
            tika: false
          - name: smoke
            federated: false
            tika: false
          - name: user-settings
            federated: false
            tika: false
    env:
      BASE_URL_OCIS: localhost:9200
      HEADLESS: true
      RETRY: 1
      BROWSER: chromium
      REPORT_TRACING: false
      FAIL_ON_UNCAUGHT_CONSOLE_ERR: true
      SKIP_A11Y_TESTS: true
      TEST_TYPE: playwright
      FEDERATED_BASE_URL_OCIS: localhost:10200
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: web-dist
          path: dist

      - name: Run oCIS service
        run: |
          docker run -d \
            --name ocis \
            -p 9200:9200 \
            -v ${{ github.workspace }}:/workspace \
            -e IDM_ADMIN_PASSWORD=admin \
            -e OCIS_INSECURE=true \
            -e OCIS_LOG_LEVEL=error \
            -e OCIS_JWT_SECRET=some-ocis-jwt-secret \
            -e LDAP_GROUP_SUBSCRIPTION_FILTER_TYPE=any \
            -e LDAP_USER_SUBSCRIPTION_FILTER_TYPE=any \
            -e WEB_ASSET_CORE_PATH=/workspace/dist \
            -e FRONTEND_SEARCH_MIN_LENGTH=2 \
            -e OCIS_PASSWORD_POLICY_BANNED_PASSWORDS_LIST=/workspace/tests/drone/banned-passwords.txt \
            -e GRAPH_AVAILABLE_ROLES=b1e2218d-eef8-4d4c-b82d-0f1a1b48f3b5,a8d5fe5e-96e3-418d-825b-534dbdf22b99,fb6c3e19-e378-47e5-b277-9732f9de6e21,58c63c02-1d89-4572-916a-870abc5a1b7d,2d00ce52-1fc2-4dbc-8b95-a73b73395f5a,1c996275-f1c9-4e71-abdf-a42f6495e960,312c0871-5ef7-4b3a-85b6-0e4074c64049,aa97fe03-7980-45ac-9e50-b325749fd7e6,63e64e19-8d43-42ec-a738-2b6af2610efa \
            -e FRONTEND_CONFIGURABLE_NOTIFICATIONS=true \
            -e OCIS_URL=https://localhost:9200 \
            -e WEB_UI_CONFIG_FILE=/workspace/tests/drone/config-ocis.json \
            -e OCIS_TRANSFER_SECRET=some-ocis-transfer-secret \
            -e OCIS_LOG_PRETTY=true \
            -e OCIS_LOG_COLOR=true \
            -e OCIS_ADMIN_USER_ID=some-admin-user-id-0000-000000000000 \
            -e OCIS_SYSTEM_USER_ID=some-system-user-id-000-000000000000 \
            -e OCIS_SYSTEM_USER_API_KEY=some-system-user-machine-auth-api-key \
            -e OCIS_MACHINE_AUTH_API_KEY=some-ocis-machine-auth-api-key \
            -e COLLABORATION_WOPIAPP_SECRET=some-wopi-secret \
            -e IDM_SVC_PASSWORD=some-ldap-idm-password \
            -e GRAPH_LDAP_BIND_PASSWORD=some-ldap-idm-password \
            -e IDM_REVASVC_PASSWORD=some-ldap-reva-password \
            -e GROUPS_LDAP_BIND_PASSWORD=some-ldap-reva-password \
            -e USERS_LDAP_BIND_PASSWORD=some-ldap-reva-password \
            -e AUTH_BASIC_LDAP_BIND_PASSWORD=some-ldap-reva-password \
            -e IDM_IDPSVC_PASSWORD=some-ldap-idp-password \
            -e IDP_LDAP_BIND_PASSWORD=some-ldap-idp-password \
            -e GATEWAY_STORAGE_USERS_MOUNT_ID=storage-users-1 \
            -e STORAGE_USERS_MOUNT_ID=storage-users-1 \
            -e GRAPH_APPLICATION_ID=application-1 \
            -e OCIS_SERVICE_ACCOUNT_ID=service-account-id \
            -e OCIS_SERVICE_ACCOUNT_SECRET=service-account-secret \
            -e PROXY_CSP_CONFIG_FILE_LOCATION=/workspace/tests/drone/csp.yaml \
            -e PROXY_ENABLE_BASIC_AUTH=true \
            -e SEARCH_EXTRACTOR_TYPE='tika' \
            -e SEARCH_EXTRACTOR_TIKA_TIKA_URL='http://localhost:9998' \
            -e SEARCH_EXTRACTOR_CS3SOURCE_INSECURE=true \
            -e OCM_OCM_PROVIDER_AUTHORIZER_PROVIDERS_FILE='/workspace/dev/docker/ocis.storage.ocmproviders.json' \
            -e OCM_OCM_INVITE_MANAGER_INSECURE=true \
            -e OCM_OCM_SHARE_PROVIDER_INSECURE=true \
            -e OCM_OCM_STORAGE_PROVIDER_INSECURE=true \
            owncloud/ocis-rolling:latest

      - name: Wait for oCIS service
        run: |
          echo "Waiting for oCIS"
          # 150s timeout
          for i in {1..30}; do
            if curl -kfsSL https://localhost:9200 > /dev/null; then
              echo "oCIS is up ✅"
              exit 0
            fi
            echo "Retrying in 5s..."
            sleep 5
          done
          echo "❌ oCIS failed to start"
          docker logs ocis
          docker inspect ocis
          exit 1

      - name: Run federated oCIS service
        if: matrix.suites.federated == true
        run: |
          docker run -d \
            --name ocis-federated \
            -p 10200:9200 \
            -v ${{ github.workspace }}:/workspace \
            -e IDM_ADMIN_PASSWORD=admin \
            -e OCIS_INSECURE=true \
            -e OCIS_LOG_LEVEL=error \
            -e OCIS_JWT_SECRET=some-ocis-jwt-secret \
            -e LDAP_GROUP_SUBSCRIPTION_FILTER_TYPE=any \
            -e LDAP_USER_SUBSCRIPTION_FILTER_TYPE=any \
            -e WEB_ASSET_CORE_PATH=/workspace/dist \
            -e FRONTEND_SEARCH_MIN_LENGTH=2 \
            -e OCIS_PASSWORD_POLICY_BANNED_PASSWORDS_LIST=/workspace/tests/drone/banned-passwords.txt \
            -e GRAPH_AVAILABLE_ROLES=b1e2218d-eef8-4d4c-b82d-0f1a1b48f3b5,a8d5fe5e-96e3-418d-825b-534dbdf22b99,fb6c3e19-e378-47e5-b277-9732f9de6e21,58c63c02-1d89-4572-916a-870abc5a1b7d,2d00ce52-1fc2-4dbc-8b95-a73b73395f5a,1c996275-f1c9-4e71-abdf-a42f6495e960,312c0871-5ef7-4b3a-85b6-0e4074c64049,aa97fe03-7980-45ac-9e50-b325749fd7e6,63e64e19-8d43-42ec-a738-2b6af2610efa \
            -e FRONTEND_CONFIGURABLE_NOTIFICATIONS=true \
            -e OCIS_URL=https://localhost:10200 \
            -e WEB_UI_CONFIG_FILE=/workspace/tests/drone/config-ocis-federated.json \
            -e OCIS_TRANSFER_SECRET=some-ocis-transfer-secret \
            -e OCIS_LOG_PRETTY=true \
            -e OCIS_LOG_COLOR=true \
            -e OCIS_ADMIN_USER_ID=some-admin-user-id-0000-000000000000 \
            -e OCIS_SYSTEM_USER_ID=some-system-user-id-000-000000000000 \
            -e OCIS_SYSTEM_USER_API_KEY=some-system-user-machine-auth-api-key \
            -e OCIS_MACHINE_AUTH_API_KEY=some-ocis-machine-auth-api-key \
            -e COLLABORATION_WOPIAPP_SECRET=some-wopi-secret \
            -e IDM_SVC_PASSWORD=some-ldap-idm-password \
            -e GRAPH_LDAP_BIND_PASSWORD=some-ldap-idm-password \
            -e IDM_REVASVC_PASSWORD=some-ldap-reva-password \
            -e GROUPS_LDAP_BIND_PASSWORD=some-ldap-reva-password \
            -e USERS_LDAP_BIND_PASSWORD=some-ldap-reva-password \
            -e AUTH_BASIC_LDAP_BIND_PASSWORD=some-ldap-reva-password \
            -e IDM_IDPSVC_PASSWORD=some-ldap-idp-password \
            -e IDP_LDAP_BIND_PASSWORD=some-ldap-idp-password \
            -e GATEWAY_STORAGE_USERS_MOUNT_ID=storage-users-1 \
            -e STORAGE_USERS_MOUNT_ID=storage-users-1 \
            -e GRAPH_APPLICATION_ID=application-1 \
            -e OCIS_SERVICE_ACCOUNT_ID=service-account-id \
            -e OCIS_SERVICE_ACCOUNT_SECRET=service-account-secret \
            -e PROXY_CSP_CONFIG_FILE_LOCATION=/workspace/tests/drone/csp.yaml \
            -e PROXY_ENABLE_BASIC_AUTH=true \
            -e SEARCH_EXTRACTOR_TYPE='tika' \
            -e SEARCH_EXTRACTOR_TIKA_TIKA_URL='http://localhost:9998' \
            -e SEARCH_EXTRACTOR_CS3SOURCE_INSECURE=true \
            -e OCM_OCM_PROVIDER_AUTHORIZER_PROVIDERS_FILE='/workspace/dev/docker/ocis.storage.ocmproviders.json' \
            -e OCM_OCM_INVITE_MANAGER_INSECURE=true \
            -e OCM_OCM_SHARE_PROVIDER_INSECURE=true \
            -e OCM_OCM_STORAGE_PROVIDER_INSECURE=true \
            owncloud/ocis-rolling:latest

      - name: Wait for federated oCIS service
        if: matrix.suites.federated == true
        run: |
          echo "Waiting for federated oCIS"
          # 150s timeout
          for i in {1..30}; do
            if curl -kfsSL https://localhost:10200 > /dev/null; then
              echo "federated oCIS is up ✅"
              exit 0
            fi
            echo "Retrying in 5s..."
            sleep 5
          done
          echo "❌ federated oCIS failed to start"
          docker logs ocis-federated
          docker inspect ocis-federated
          exit 1

      - name: Run tika service
        if: matrix.suites.tika == true
        run: |
          docker run -d \
            --name tika \
            -p 9998:9998 \
            apache/tika:3.2.3.0

      - name: Wait for tika service
        if: matrix.suites.tika == true
        run: |
          echo "Waiting for tika"
          # 150s timeout
          for i in {1..30}; do
            if curl -kfsSL http://localhost:9998 > /dev/null; then
              echo "tika is up ✅"
              exit 0
            fi
            echo "Retrying in 5s..."
            sleep 5
          done
          echo "❌ tika failed to start"
          docker logs tika
          docker inspect tika
          exit 1

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd ${{ github.workspace }}/tests/e2e && bash run-e2e.sh --type playwright --suites ${{ matrix.suites.name }}
