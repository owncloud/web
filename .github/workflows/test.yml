name: Test and build

on:
  push:
    branches:
      - master
      - stable-*
    tags:
      - '*'
  pull_request:

jobs:
  check-flags:
    runs-on: ubuntu-latest
    outputs:
      full-ci: ${{ steps.full-ci.outputs.full-ci }}
      ci-relevant: ${{ steps.paths.outputs.ci-relevant }}
      workflows: ${{ steps.paths.outputs.workflows }}
      affected-suites: ${{ steps.affected-suites.outputs.suites }}
    steps:
      - name: Resolve full-ci flag
        id: full-ci
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # non-PR events (push, tag) always run the full matrix
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "full-ci=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [[ "${PR_TITLE,,}" == *"full-ci"* ]]; then
            echo "full-ci=true" >> $GITHUB_OUTPUT
          else
            echo "full-ci=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: github.event_name == 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0

      - name: Detect changed files
        id: paths
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            ci-relevant:
              - 'packages/**'
              - '!packages/web-app-skeleton/**'
              - 'polyfills/**'
              - 'tests/**'
              - '!tests/e2e/**'
              - 'vite*.ts'
              - 'tsconfig.json'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'eslint.config.js'
              - 'babel.config.cjs'
              - 'index.html'
              - 'web.d.ts'
              - 'gettext.config.cjs'
              - 'vitest.config.ts'
              - 'cucumber.mjs'
            workflows:
              - '.github/workflows/**'

      - name: Determine affected test suites
        id: affected-suites
        if: github.event_name == 'pull_request'
        env:
          DRONE_TARGET_BRANCH: ${{ github.base_ref }}
          DRONE_BUILD_EVENT: pull_request
        run: |
          all_suites="admin-settings,spaces,navigation,user-settings,app-store,file-action,shares,search,runtime,app-provider,ocm,oidc,smoke,mfa"
          node tests/drone/filterTestSuitesToRun.js "$all_suites" || exit_code=$?
          if [ "${exit_code:-0}" -eq 78 ]; then
            echo "suites=" >> $GITHUB_OUTPUT
          elif [ "${exit_code:-0}" -ne 0 ]; then
            exit $exit_code
          else
            source tests/drone/suites.env
            echo "suites=$TEST_SUITES" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-flags
    if: |
      github.event_name != 'pull_request' ||
      needs.check-flags.outputs.full-ci == 'true' ||
      needs.check-flags.outputs.ci-relevant == 'true' ||
      needs.check-flags.outputs.workflows == 'true' ||
      needs.check-flags.outputs.affected-suites != ''
    uses: ./.github/workflows/_build.yml

  e2e:
    needs: [build, check-flags]
    if: |
      !cancelled() &&
      needs.build.result != 'failure' &&
      needs.build.result != 'cancelled' &&
      (github.event_name != 'pull_request' ||
       needs.check-flags.outputs.full-ci == 'true' ||
       needs.check-flags.outputs.workflows == 'true' ||
       needs.check-flags.outputs.affected-suites != '')
    uses: ./.github/workflows/_e2e.yml
    with:
      full-ci: ${{ needs.check-flags.outputs.full-ci == 'true' || needs.check-flags.outputs.workflows == 'true' }}
      affected-suites: ${{ needs.check-flags.outputs.affected-suites }}

  check-tests-passed:
    needs: [build, e2e]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all test jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
