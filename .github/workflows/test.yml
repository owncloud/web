name: Test and build

on:
  push:
    branches:
      - master
      - stable-*
    tags:
      - '*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check licenses
        run: pnpm licenses:check

      - name: Save licenses
        run: pnpm licenses:csv && pnpm licenses:save

      - name: Check types
        run: pnpm check:types

      - name: Check format
        run: pnpm check:format

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:unit --coverage

      - name: SonarCloud Scan
        if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/')
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PULL_REQUEST_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || '' }}
          SONAR_PULL_REQUEST_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || '' }}
          SONAR_PULL_REQUEST_KEY: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}

      - name: Build
        run: make dist

      - name: Store build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: web-dist
          path: dist
          if-no-files-found: error

  e2e-playwright:
    needs: build
    runs-on: ubuntu-latest
    name: e2e-tests-${{ matrix.suites.suite }}
    strategy:
      fail-fast: false
      matrix:
        suites:
          - suite: part-1
            test_suites: admin-settings,spaces
          - suite: part-2
            test_suites: navigation,user-settings,app-store,file-action
          - suite: part-3
            test_suites: shares,search,runtime
            tika: true
          - suite: app-provider
            test_suites: app-provider
            collaboration: true
          - suite: ocm
            test_suites: ocm
            federated: true
          - suite: oidc
            feature_files: specs/oidc/refreshToken.spec.ts
            oidc: true
          - suite: oidc-iframe
            feature_files: specs/oidc/iframeTokenRenewal.spec.ts
            oidc_iframe: true
          - suite: smoke
            test_suites: smoke
    env:
      BASE_URL_OCIS: localhost:9200
      HEADLESS: true
      RETRY: 1
      BROWSER: chromium
      REPORT_TRACING: false
      FAIL_ON_UNCAUGHT_CONSOLE_ERR: true
      SKIP_A11Y_TESTS: true
      TEST_TYPE: playwright
      FEDERATED_BASE_URL_OCIS: localhost:10200
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 #v5.0.0
        with:
          version: 10.29.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.25.7
          cache: true

      - name: Install dependencies
        run: pnpm install

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: dist

      - name: Setup services
        run: |
          flags=""
          if [[ "${{ matrix.suites.tika }}" == "true" ]]; then
            flags="$flags --tika"
          fi
          if [[ "${{ matrix.suites.federated }}" == "true" ]]; then
            flags="$flags --federation"
          fi
          if [[ "${{ matrix.suites.collaboration }}" == "true" ]]; then
            flags="$flags --collaboration"
          fi
          if [[ "${{ matrix.suites.oidc }}" == "true" ]]; then
            flags="$flags --oidc"
          fi
          if [[ "${{ matrix.suites.oidc_iframe }}" == "true" ]]; then
            flags="$flags --oidc-iframe"
          fi
          cd "${{ github.workspace }}/tests/actions"
          bash setup-services.sh $flags

      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          FEATURE_FILES: ${{ matrix.suites.feature_files || '' }}
          TEST_SUITES: ${{ matrix.suites.test_suites || '' }}
        run: cd ${{ github.workspace }}/tests/e2e && bash run-e2e.sh --type playwright

      - name: Upload tracing result
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: playwright-traces-${{ strategy.job-index }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/reports/e2e
          retention-days: 7
